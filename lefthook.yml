pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,jsx,ts,tsx,css,html,json,md,mdx,yaml,yml}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx oxlint --fix -c apps/web/oxlint.config.mjs {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
